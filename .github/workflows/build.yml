name: Build macOS App

on:
  push:
    branches: [ "main" ] # Triggers when you commit to main
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:     # Adds a button to trigger it manually

jobs:
  build:
    name: Build Dorso
    runs-on: macos-14 # Uses a modern macOS runner

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Make build script executable
      run: chmod +x build.sh

    # Optional: Run your unit tests before building
    - name: Run Unit Tests
      run: swift test

    - name: Build and Archive App
      run: ./build.sh --release
      
    - name: Upload App Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Dorso-App-Latest
        # Grabs the zip file generated by ./build.sh --release
        path: build/*.zip 
        retention-days: 14 # Keeps the download link active for 14 days